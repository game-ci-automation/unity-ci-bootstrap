#cloud-config

# Unity CI Bootstrap — VM Setup Script
# Runs once on first boot after Terraform provisioning.
# Sets up a browser-accessible Ubuntu desktop with Docker, noVNC, Git,
# Unity Hub pre-installed, and a desktop shortcut for easy launch.
# noVNC starts last — when port 6080 is reachable, setup is complete.

package_update: true
package_upgrade: true

packages:
  # Desktop environment (lightweight)
  - xfce4
  - xfce4-goodies
  # VNC + browser access
  - x11vnc
  - novnc
  - websockify
  # Docker dependencies
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  # Utilities
  - git
  - wget
  - fuse

runcmd:
  # --- Docker Engine ---
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  - usermod -aG docker azureuser
  - systemctl enable docker
  - systemctl start docker

  # --- Xvfb virtual display service ---
  - apt-get install -y xvfb
  - |
    cat > /etc/systemd/system/xvfb.service << 'EOF'
    [Unit]
    Description=Xvfb Virtual Display
    After=network.target

    [Service]
    Type=simple
    User=azureuser
    ExecStart=/usr/bin/Xvfb :1 -screen 0 1920x1080x24
    Restart=on-failure

    [Install]
    WantedBy=multi-user.target
    EOF

  # --- XFCE4 desktop session service ---
  - |
    cat > /etc/systemd/system/xfce4-session.service << 'EOF'
    [Unit]
    Description=XFCE4 Desktop Session
    After=xvfb.service
    Requires=xvfb.service

    [Service]
    Type=simple
    User=azureuser
    Environment=DISPLAY=:1
    ExecStart=/usr/bin/startxfce4
    Restart=on-failure

    [Install]
    WantedBy=multi-user.target
    EOF

  # --- x11vnc service ---
  - |
    cat > /etc/systemd/system/x11vnc.service << 'EOF'
    [Unit]
    Description=x11vnc VNC Server
    After=xfce4-session.service

    [Service]
    Type=simple
    User=azureuser
    Environment=DISPLAY=:1
    ExecStart=/usr/bin/x11vnc -display :1 -nopw -listen localhost -xkb -forever
    Restart=on-failure

    [Install]
    WantedBy=multi-user.target
    EOF

  # --- noVNC websockify service (port 6080) ---
  - |
    cat > /etc/systemd/system/novnc.service << 'EOF'
    [Unit]
    Description=noVNC WebSocket Proxy
    After=x11vnc.service

    [Service]
    Type=simple
    ExecStart=/usr/bin/websockify --web /usr/share/novnc 6080 localhost:5900
    Restart=on-failure

    [Install]
    WantedBy=multi-user.target
    EOF

  # --- noVNC setup ---
  - mkdir -p /etc/novnc
  - ln -sf /usr/share/novnc/vnc.html /usr/share/novnc/index.html

  # --- GitHub CLI ---
  - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
  - echo "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
  - apt-get update
  - apt-get install -y gh

  # --- Unity Hub (official apt repo) ---
  - install -d /etc/apt/keyrings
  - curl -fsSL https://hub.unity3d.com/linux/keys/public | gpg --dearmor -o /etc/apt/keyrings/unityhub.gpg
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/unityhub.gpg] https://hub.unity3d.com/linux/repos/deb stable main" > /etc/apt/sources.list.d/unityhub.list
  - apt-get update
  - apt-get install -y unityhub

  # --- Desktop folder and Unity Hub shortcut ---
  - mkdir -p /home/azureuser/Desktop
  - |
    cat > /home/azureuser/Desktop/Unity\ Hub.desktop << 'EOF'
    [Desktop Entry]
    Version=1.0
    Type=Application
    Name=Unity Hub
    Exec=env DISPLAY=:1 /usr/bin/unityhub --no-sandbox --disable-gpu
    Icon=unityhub
    Terminal=false
    Categories=Development;
    EOF
  - chmod +x /home/azureuser/Desktop/Unity\ Hub.desktop
  - chown -R azureuser:azureuser /home/azureuser/Desktop

  # --- Environment variables for downloader ---
  - |
    cat > /home/azureuser/.unity-ci-env << 'ENVEOF'
    export FUNCTION_URL=${function_app_url}
    export REPO_URL=${repo_url}
    export PLATFORM=${platform}
    export KEY_VAULT_NAME=${key_vault_name}
    export RESOURCE_GROUP_NAME=${resource_group_name}
    export IMAGE_GALLERY_NAME=${image_gallery_name}
    export IMAGE_DEFINITION_NAME=${image_definition_name}
    export GH_TOKEN=${github_token}
    ENVEOF
  - chown azureuser:azureuser /home/azureuser/.unity-ci-env

  # --- game-ci downloader CLI ---
  - wget "https://github.com/game-ci-automation/unity-ci-bootstrap/releases/latest/download/downloader-linux-amd64" -O /home/azureuser/Desktop/downloader
  - chmod +x /home/azureuser/Desktop/downloader
  - chown azureuser:azureuser /home/azureuser/Desktop/downloader

  # --- Bootstrap runner script (waits for license, then runs downloader) ---
  - |
    cat > /home/azureuser/Desktop/run-bootstrap.sh << 'SCRIPTEOF'
    #!/usr/bin/env bash
    source ~/.unity-ci-env

    echo "========================================"
    echo "  Unity CI Bootstrap"
    echo "========================================"
    echo ""
    echo "Step 1: Open Unity Hub (desktop icon) and activate your license."
    echo "Step 2: Once done, come back here and press Enter."
    echo ""
    read -p "Press Enter after Unity license is activated..."
    echo ""
    echo "Starting downloader..."
    ~/Desktop/downloader
    SCRIPTEOF
  - chmod +x /home/azureuser/Desktop/run-bootstrap.sh
  - chown azureuser:azureuser /home/azureuser/Desktop/run-bootstrap.sh

  # --- Auto-open terminal with bootstrap script on desktop login ---
  - mkdir -p /home/azureuser/.config/autostart
  - |
    cat > /home/azureuser/.config/autostart/bootstrap-terminal.desktop << 'EOF'
    [Desktop Entry]
    Type=Application
    Name=Bootstrap Terminal
    Exec=xfce4-terminal --maximize -e "bash /home/azureuser/Desktop/run-bootstrap.sh"
    X-GNOME-Autostart-enabled=true
    EOF
  - chown -R azureuser:azureuser /home/azureuser/.config

  # --- Enable and start display services (noVNC last = ready signal) ---
  - systemctl daemon-reload
  - systemctl enable xvfb xfce4-session x11vnc novnc
  - systemctl start xvfb
  - sleep 2
  - systemctl start xfce4-session
  - sleep 3
  - systemctl start x11vnc
  - sleep 2
  - systemctl start novnc

final_message: "Unity CI Bootstrap VM setup complete. Connect via noVNC at http://<public-ip>:6080"
